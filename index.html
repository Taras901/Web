<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Керування вертольотами</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">🚁 Мій Ангар</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Мої вертольоти</a>
                    </li>
                    <li class="nav-item">
                        <button id="createBtn" class="nav-link btn" data-bs-toggle="modal" data-bs-target="#helicopterModal">Створити вертоліт</button>
                    </li>
                </ul>
                <form class="d-flex">
                    <input class="form-control me-2" type="search" placeholder="Введіть щось...">
                    <button class="btn btn-primary me-2" type="submit">Пошук</button>
                    <button class="btn btn-outline-secondary" type="button">Очистити</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-lg-3">
                <div class="card p-3">
                    <h4>Керування</h4>
                    <hr>
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="sortSwitch">
                        <label class="form-check-label" for="sortSwitch">Сортувати за швидкістю</label>
                    </div>
                    <h5>Загальна пасажиромісткість</h5>
                    <button class="btn btn-primary w-100 mb-2" id="calculateTotalPassengers">Порахувати</button>
                    <p class="fs-4">Всього пасажирів: <span class="fw-bold" id="totalPassengers">...</span></p>
                </div>
            </div>
            <div class="col-lg-9">
                <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="helicopter-list">
                    </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="helicopterModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Дані про вертоліт</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="helicopterForm">
                        <input type="hidden" id="helicopterId">
                        
                        <div class="mb-3">
                            <label for="helicopterName" class="form-label">Назва</label>
                            <input type="text" class="form-control" id="helicopterName" required>
                        </div>
                        <div class="mb-3">
                            <label for="helicopterImage" class="form-label">URL зображення</label>
                            <input type="url" class="form-control" id="helicopterImage" placeholder="https://example.com/image.jpg" required>
                        </div>
                        <div class="mb-3">
                            <label for="helicopterPassengers" class="form-label">Кількість пасажирів</label>
                            <input type="number" class="form-control" id="helicopterPassengers" required>
                        </div>
                        <div class="mb-3">
                            <label for="helicopterSpeed" class="form-label">Максимальна швидкість (км/год)</label>
                            <input type="number" class="form-control" id="helicopterSpeed" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
                    <button type="submit" form="helicopterForm" class="btn btn-success">Зберегти</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
